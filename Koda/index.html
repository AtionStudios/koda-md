<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Koda — Markdown Editor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;family=Merriweather:wght@400;700&amp;family=Roboto:wght@400;500;700&amp;family=Open+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "var(--color-primary)",
                    "background-light": "var(--bg-light)",
                    "background-dark": "var(--bg-dark)",
                },
                fontFamily: {
                    "display": ["var(--font-display)", "sans-serif"],
                    "mono": ["var(--font-mono)", "monospace"]
                },
                borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
        },
    }
</script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 h-screen flex flex-col overflow-hidden">

<!-- ═══════════════════════ HEADER (Injetado via Módulo) ═══════════════════════ -->
<div id="app-header"></div>

<!-- ═══════════════════════ TOOLBAR (Injetada via Módulo) ═══════════════════════ -->
<div id="app-toolbar"></div>

<!-- ═══════════════════════ MAIN & SIDEBAR (Injetados via Módulos) ═══════════════════════ -->
<div id="app-main"></div>

<!-- ═══════════════════════ MODALS & FLOATING CONTROLS (Injetados via Módulo) ═══════════════════════ -->
<div id="app-modals"></div>

<script type="module" src="/src/main.js"></script>
</body>

</html>
