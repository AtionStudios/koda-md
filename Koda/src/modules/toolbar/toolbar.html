<!-- src/modules/toolbar/toolbar.html -->
<div class="flex-shrink-0 flex items-center justify-between border-b border-slate-200 dark:border-slate-800 px-6 py-2 bg-slate-50 dark:bg-slate-900/30 z-10">
<div class="flex items-center gap-1" id="toolbar-actions">
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded text-slate-600 dark:text-slate-400" data-action="h1" title="Heading 1"><span class="material-symbols-outlined text-xl">format_h1</span></button>
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded text-slate-600 dark:text-slate-400" data-action="h2" title="Heading 2"><span class="material-symbols-outlined text-xl">format_h2</span></button>
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded text-slate-600 dark:text-slate-400" data-action="h3" title="Heading 3"><span class="material-symbols-outlined text-xl">format_h3</span></button>
<div class="w-px h-6 bg-slate-300 dark:bg-slate-700 mx-1"></div>
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded text-slate-600 dark:text-slate-400" data-action="bold" title="Bold"><span class="material-symbols-outlined text-xl">format_bold</span></button>
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded text-slate-600 dark:text-slate-400" data-action="italic" title="Italic"><span class="material-symbols-outlined text-xl">format_italic</span></button>
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded text-slate-600 dark:text-slate-400" data-action="underline" title="Underline"><span class="material-symbols-outlined text-xl">format_underlined</span></button>
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded text-slate-600 dark:text-slate-400" data-action="list" title="List"><span class="material-symbols-outlined text-xl">format_list_bulleted</span></button>
<div class="w-px h-6 bg-slate-300 dark:bg-slate-700 mx-1"></div>
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded text-slate-600 dark:text-slate-400" data-action="link" title="Link"><span class="material-symbols-outlined text-xl">link</span></button>
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded text-slate-600 dark:text-slate-400" data-action="image" title="Image"><span class="material-symbols-outlined text-xl">image</span></button>
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded text-slate-600 dark:text-slate-400" data-action="table" title="Table"><span class="material-symbols-outlined text-xl">table_chart</span></button>
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded text-slate-600 dark:text-slate-400" data-action="hr" title="Horizontal Rule"><span class="material-symbols-outlined text-xl">horizontal_rule</span></button>
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded text-slate-600 dark:text-slate-400" data-action="code" title="Code Block"><span class="material-symbols-outlined text-xl">code_blocks</span></button>
</div>
<div class="flex items-center gap-4 text-xs font-medium text-slate-500 uppercase tracking-tighter">
<span id="stat-words">Words: 0</span>
<span id="stat-lines">Lines: 0</span>
<span id="stat-saved" class="text-green-500 flex items-center gap-1"><span class="material-symbols-outlined text-xs">check_circle</span> Saved</span>
</div>
</div>
