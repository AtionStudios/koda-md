<!-- src/modules/header/header.html -->
<header class="flex-shrink-0 flex items-center justify-between border-b border-slate-200 dark:border-slate-800 px-6 py-3 bg-white dark:bg-slate-900/50 backdrop-blur-md z-20">
    <div class="flex items-center gap-4">
        <div class="bg-primary p-1.5 rounded-lg flex items-center justify-center">
            <span class="material-symbols-outlined text-white text-xl">description</span>
        </div>
        <div class="flex flex-col">
            <input id="doc-title" class="bg-transparent border-none p-0 text-sm font-bold focus:ring-0 text-slate-900 dark:text-slate-100 w-48" placeholder="Document Title" type="text" value="Untitled Document"/>
            <span class="text-[10px] text-slate-500 font-medium uppercase tracking-wider">Koda Markdown Editor</span>
        </div>
    </div>
    <nav class="flex items-center gap-6">
        <div class="flex items-center bg-slate-100 dark:bg-slate-800 p-1 rounded-xl mr-2">
            <button class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all bg-white dark:bg-slate-700 shadow-sm text-primary" id="btn-view-split">Split</button>
            <button class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-700 dark:hover:text-slate-300" id="btn-view-code">Code</button>
            <button class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500 hover:text-slate-700 dark:hover:text-slate-300" id="btn-view-preview">Preview</button>
        </div>
        <div class="flex items-center gap-1">
            <button id="btn-new-doc" class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <span class="material-symbols-outlined text-lg">add</span> New
            </button>
            <button id="btn-open-doc" class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <span class="material-symbols-outlined text-lg">folder_open</span> Open
            </button>
        </div>
        <div class="h-6 w-px bg-slate-200 dark:bg-slate-800"></div>
        <button id="btn-top-export" class="bg-primary hover:bg-primary/90 text-white px-4 py-1.5 rounded-lg text-sm font-bold flex items-center gap-2 transition-all shadow-lg shadow-primary/20">
            <span class="material-symbols-outlined text-lg">ios_share</span> Export
        </button>
    </nav>
</header>
