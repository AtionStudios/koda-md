<!-- src/modules/editor_view/editor.html -->
<main class="flex flex-1 min-h-0 overflow-hidden" id="app-main">
<!-- Editor Column -->
<div class="w-1/2 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex flex-col min-h-0" id="editor-container">
<textarea class="flex-1 w-full font-mono text-sm resize-none focus:ring-0 border-none bg-transparent text-slate-800 dark:text-slate-300 leading-relaxed px-12 py-10 overflow-y-auto" id="markdown-input" placeholder="# Write your markdown..."></textarea>
</div>
<!-- Preview Column -->
<div class="w-1/2 bg-slate-100 dark:bg-slate-950 overflow-y-auto" id="preview-container">
<div class="paper-scale-wrapper" id="page-wrapper">
    <!-- Pages will be injected here by the Paginator -->
</div>
</div>
<!-- Settings Sidebar injected here -->
<div id="app-sidebar"></div>
</main>
