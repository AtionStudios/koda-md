<!-- src/modules/sidebar/sidebar.html -->
<aside class="flex-shrink-0 border-l border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 w-80 flex flex-col min-h-0 overflow-y-auto" id="settings-sidebar">
<div class="p-5 space-y-5 flex-1">

<!-- Typography Settings -->
<div>
<h3 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-3">Typography</h3>
<div class="space-y-3">
<div class="flex flex-col gap-1">
    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Font Family</label>
    <select id="cfg-font-family" class="bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-primary focus:border-primary">
        <option value="Inter, sans-serif">Inter (Default)</option>
        <option value="Arial, Helvetica, sans-serif">Arial</option>
        <option value="'Times New Roman', Times, serif">Times New Roman</option>
        <option value="Roboto, sans-serif">Roboto</option>
        <option value="'Open Sans', sans-serif">Open Sans</option>
        <option value="Merriweather, serif">Merriweather</option>
        <option value="Georgia, serif">Georgia</option>
    </select>
</div>
<div class="flex gap-2">
    <div class="flex flex-col gap-1 flex-1">
        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Size (pt)</label>
        <input id="cfg-font-size" type="number" min="8" max="24" value="12" class="bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-primary"/>
    </div>
    <div class="flex flex-col gap-1 flex-1">
        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Line Height</label>
        <select id="cfg-line-height" class="bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-primary focus:border-primary">
            <option value="1.4">Compact (1.4)</option>
            <option value="1.6" selected>Normal (1.6)</option>
            <option value="1.8">Relaxed (1.8)</option>
            <option value="2.0">Double (2.0)</option>
        </select>
    </div>
</div>
</div>
</div>

<!-- Export Settings -->
<div class="pt-3 border-t border-slate-100 dark:border-slate-800">
<h3 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-3">Export Format</h3>
<div class="space-y-2">
<div class="group flex items-center gap-3 p-3 rounded-xl border border-primary bg-primary/5 cursor-pointer export-option" data-format="pdf" id="opt-pdf">
<span class="material-symbols-outlined text-primary format-icon">picture_as_pdf</span>
<div class="flex-1">
<p class="text-sm font-bold text-slate-900 dark:text-slate-100">Export as PDF</p>
<p class="text-xs text-slate-500">Print preview</p>
</div>
<span class="material-symbols-outlined text-sm text-primary check-icon">check_circle</span>
</div>
<div class="group flex items-center gap-3 p-3 rounded-xl border border-slate-200 dark:border-slate-800 hover:border-primary/50 transition-colors cursor-pointer export-option" data-format="md" id="opt-md">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors format-icon">code</span>
<div class="flex-1">
<p class="text-sm font-bold text-slate-900 dark:text-slate-100">Save as .md</p>
<p class="text-xs text-slate-500">Raw markdown</p>
</div>
<span class="material-symbols-outlined text-sm text-primary check-icon hidden">check_circle</span>
</div>
<div class="group flex items-center gap-3 p-3 rounded-xl border border-slate-200 dark:border-slate-800 hover:border-primary/50 transition-colors cursor-pointer export-option" data-format="txt" id="opt-txt">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors format-icon">description</span>
<div class="flex-1">
<p class="text-sm font-bold text-slate-900 dark:text-slate-100">Save as .txt</p>
<p class="text-xs text-slate-500">Plain text</p>
</div>
<span class="material-symbols-outlined text-sm text-primary check-icon hidden">check_circle</span>
</div>
</div>
</div>

<!-- Paper & Page Settings -->
<div class="pt-3 border-t border-slate-100 dark:border-slate-800 space-y-4">
    <div class="flex flex-col gap-1">
        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Paper Size</label>
        <div class="flex gap-2">
            <select id="cfg-paper-size" class="flex-1 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-primary focus:border-primary">
                <option value="a4">A4</option>
                <option value="letter">Letter</option>
                <option value="legal">Legal</option>
            </select>
            <select id="cfg-paper-orientation" class="flex-1 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-primary focus:border-primary">
                <option value="portrait">Portrait</option>
                <option value="landscape">Landscape</option>
            </select>
        </div>
    </div>

    <div class="flex flex-col gap-1">
        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Page Margins (mm)</label>
        <div class="grid grid-cols-2 gap-2">
            <div class="flex flex-col gap-1">
                <span class="text-[9px] font-bold text-slate-400 uppercase ml-1">Top</span>
                <input id="cfg-margin-top" type="number" min="0" max="100" value="20" class="bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-primary"/>
            </div>
            <div class="flex flex-col gap-1">
                <span class="text-[9px] font-bold text-slate-400 uppercase ml-1">Bottom</span>
                <input id="cfg-margin-bottom" type="number" min="0" max="100" value="20" class="bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-primary"/>
            </div>
            <div class="flex flex-col gap-1">
                <span class="text-[9px] font-bold text-slate-400 uppercase ml-1">Left</span>
                <input id="cfg-margin-left" type="number" min="0" max="100" value="20" class="bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-primary"/>
            </div>
            <div class="flex flex-col gap-1">
                <span class="text-[9px] font-bold text-slate-400 uppercase ml-1">Right</span>
                <input id="cfg-margin-right" type="number" min="0" max="100" value="20" class="bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-primary"/>
            </div>
        </div>
    </div>

    <div class="flex items-center justify-between border border-slate-200 dark:border-slate-700 p-3 rounded-lg bg-slate-50 dark:bg-slate-800/50">
        <span class="text-xs font-bold text-slate-600 dark:text-slate-300 uppercase tracking-widest">Page Breaks</span>
        <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="toggle-page-breaks" class="sr-only peer" checked>
            <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-primary/30 rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
        </label>
    </div>

    <div class="flex items-center justify-between border border-slate-200 dark:border-slate-700 p-3 rounded-lg bg-slate-50 dark:bg-slate-800/50">
        <span class="text-xs font-bold text-slate-600 dark:text-slate-300 uppercase tracking-widest">Multi-line Breaks</span>
        <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="toggle-multi-breaks" class="sr-only peer">
            <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-primary/30 rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
        </label>
    </div>
</div>
</div>

<div class="flex-shrink-0 p-5 border-t border-slate-100 dark:border-slate-800 flex flex-col gap-2">
<button id="btn-download" class="w-full bg-primary text-white font-bold py-3 rounded-xl shadow-lg shadow-primary/30 flex items-center justify-center gap-2 hover:translate-y-[-2px] transition-all">
<span class="material-symbols-outlined">download</span>
Download Document
</button>
<button id="btn-backup-zip" class="w-full bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-bold py-2 rounded-xl flex items-center justify-center gap-2 hover:bg-slate-300 dark:hover:bg-slate-700 transition-all text-sm">
<span class="material-symbols-outlined text-sm">archive</span>
Backup Everything (.zip)
</button>
</div>
</aside>
